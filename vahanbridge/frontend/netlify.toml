# Netlify deployment config for VahanBridge frontend

[build]
  publish = "."
  # No build step needed — pure HTML/CSS/JS

# Redirect all HTML files cleanly (SPA-style not needed since multi-page)
[[redirects]]
  from = "/hsrp"
  to   = "/hsrp_portal.html"
  status = 200

[[redirects]]
  from = "/noc"
  to   = "/noc_transfer.html"
  status = 200

[[redirects]]
  from = "/tax"
  to   = "/tax_refund.html"
  status = 200

[[redirects]]
  from = "/bh"
  to   = "/bh_series_portal.html"
  status = 200

[[redirects]]
  from = "/puc"
  to   = "/puc_portal.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
