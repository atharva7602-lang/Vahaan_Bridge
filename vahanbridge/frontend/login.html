<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – VahanBridge</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fb;
    --surface: #eef1f8;
    --card: #ffffff;
    --border: rgba(0,0,0,0.08);
    --pink: #c8193a;
    --cyan: #0077cc;
    --text: #1a1a2e;
    --muted: #6b7080;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .auth-container {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 3rem 2.5rem; max-width: 420px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    text-align: center;
  }
  .logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem;
    background: linear-gradient(135deg, var(--pink), #ff8c42);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem;
    text-decoration: none;
  }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--pink), #ff8c42);
    display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: white; -webkit-text-fill-color: white;
  }
  .auth-container h2 { font-family: 'Syne', sans-serif; font-size: 1.6rem; margin-bottom: 0.5rem; }
  .auth-container p { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  
  .form-group { margin-bottom: 1.2rem; text-align: left; }
  .form-group label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 0.4rem; }
  .form-group input {
    width: 100%; padding: 0.8rem 1rem; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    font-family: inherit; font-size: 0.95rem; color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--pink); }
  
  .btn-submit {
    width: 100%; background: linear-gradient(135deg, var(--pink), #c0143f);
    color: #fff; padding: 0.9rem; border-radius: 10px;
    border: none; font-family: inherit; font-weight: 600; font-size: 1rem;
    cursor: pointer; margin-top: 1rem; box-shadow: 0 4px 14px rgba(200,25,58,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(200,25,58,0.4); }
  .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
  
  .auth-links { margin-top: 1.5rem; font-size: 0.85rem; color: var(--muted); }
  .auth-links a { color: var(--cyan); text-decoration: none; font-weight: 600; }
  .auth-links a:hover { text-decoration: underline; }

  #error-msg { color: var(--pink); font-size: 0.85rem; margin-bottom: 1rem; display: none; font-weight: 500; }
</style>
</head>
<body>

<div class="auth-container">
  <a href="index.html" class="logo"><div class="logo-icon">🌉</div>VahanBridge</a>
  <h2>Welcome Back</h2>
  <p>Log in to manage your vehicle services.</p>
  
  <div id="error-msg"></div>

  <form id="login-form">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn-submit" id="submit-btn">Log In</button>
  </form>

  <div class="auth-links">
    Don't have an account? <a href="register.html">Register here</a>
  </div>
</div>

<script src="auth.js"></script>
<script>
  if (isAuthenticated()) {
    window.location.href = 'index.html'; // already logged in
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('error-msg');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Logging in...';
    err.style.display = 'none';

    try {
      const res = await fetch(`${API_BASE_AUTH}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      
      if (res.ok && data.success) {
        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('auth_user', JSON.stringify(data.user));
        // Redirect to dashboard or home
        window.location.href = 'index.html';
      } else {
        err.textContent = data.error || 'Login failed';
        err.style.display = 'block';
      }
    } catch (error) {
      err.textContent = 'Network error. Please try again.';
      err.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Log In';
    }
  });
</script>

</body>
</html>
