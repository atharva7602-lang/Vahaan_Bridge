services:
  - type: web
    name: vahanbridge-api
    env: node
    region: singapore   # closest to India
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: vahanbridge-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: vahanbridge-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: vahanbridge-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: vahanbridge-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: vahanbridge-db
          property: database
      - key: FRONTEND_URL
        sync: false   # Set manually after Netlify deploy

databases:
  - name: vahanbridge-db
    databaseName: vahanbridge
    user: vahanbridge_user
    plan: free
